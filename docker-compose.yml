# Single-stack compose. Two ports are published on the host:
#   - APP_PORT  (default 9080) -> nginx proxy fronting backend + frontend
#   - WAHA_PORT (default 9081) -> WAHA WhatsApp gateway, bound to 127.0.0.1
#
# Everything else (backend, frontend, redis, optional postgres) talks over
# the internal `app-net` network. Override with docker-compose.override.yml
# if you need direct access to a service during debugging.
#
# WAHA is a stand-alone optional service: it does NOT sit behind the POS
# proxy anymore. Run it independently with `docker compose up -d waha` and
# tunnel `127.0.0.1:9081` via Cloudflare Tunnel (e.g. waha.your-domain.tld).
#
# Profiles:
#   internal-db  -> start a bundled Postgres alongside the app

name: pos

services:
  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "${APP_PORT:-9080}:80"
    volumes:
      - ./docker/proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [app-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        # WhatsApp UI is opt-in. Defaults below leave VITE_WAHA_ENABLED=false so
        # the bundle does not auto-open a WAHA WebSocket with the placeholder key.
        # To enable, set VITE_WAHA_ENABLED=true + a real VITE_WAHA_API_KEY in .env
        # and rebuild the frontend image.
        VITE_WAHA_ENABLED: ${VITE_WAHA_ENABLED:-false}
        # WAHA now lives on its own hostname (Cloudflare tunnel). Default to
        # the production domain; override per-environment if needed. The
        # placeholder key is intentionally empty so the frontend stays in
        # "unconfigured" mode unless a real key is baked in at build time.
        VITE_WAHA_URL: ${VITE_WAHA_URL:-https://waha.ourtestcloud.my.id}
        VITE_WAHA_API_KEY: ${VITE_WAHA_API_KEY:-}
    restart: unless-stopped
    networks: [app-net]

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      # Lets the container reach a Postgres running on the Docker host
      # (e.g. another docker container on the host network, or a system PG).
      # Required on Linux; Docker Desktop on Mac/Windows resolves it natively.
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.docker
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:9080}
      APP_KEY: ${APP_KEY:-}
      LOG_CHANNEL: stack
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-pos_sc}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      BROADCAST_CONNECTION: log
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost,localhost:9080,127.0.0.1,127.0.0.1:9080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:9080}
      # WhatsApp / WAHA is OFF by default. Enable it later by setting
      # WAHA_ENABLED=true and a real WAHA_API_KEY. WAHA_BASE_URL defaults
      # to the Cloudflare-tunneled hostname; for an in-cluster call you can
      # set it to http://waha:3000 instead (the `waha` service joins the
      # same app-net network).
      WAHA_ENABLED: ${WAHA_ENABLED:-false}
      WAHA_BASE_URL: ${WAHA_BASE_URL:-https://waha.ourtestcloud.my.id}
      WAHA_API_KEY: "${WAHA_API_KEY:-}"
      WAHA_SESSION: ${WAHA_SESSION:-default}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      RUN_QUEUE_WORKER: ${RUN_QUEUE_WORKER:-true}
    volumes:
      - backend-storage:/var/www/html/storage
    networks: [app-net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/up"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 5

  # Optional bundled Postgres. NOT started by default — the stack expects you
  # to point DB_HOST at an existing Postgres on the Docker host (or anywhere
  # reachable from the backend container). Enable with:
  #   docker compose --profile internal-db up -d
  # and set DB_HOST=postgres, DB_DATABASE=${POSTGRES_DB}, etc. in your env.
  postgres:
    image: postgres:16-alpine
    profiles: ["internal-db"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pos_sc}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required when using the internal-db profile}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [app-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pos_sc}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - sh
      - -c
      - >
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes;
        else
          exec redis-server --appendonly yes;
        fi
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    networks: [app-net]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $$REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Stand-alone WAHA (WhatsApp gateway). Independent of the POS proxy.
  # Bound to 127.0.0.1:9081 on the host so only the local Cloudflare Tunnel
  # daemon can reach it; expose publicly by pointing a tunnel hostname
  # (e.g. waha.ourtestcloud.my.id) at http://localhost:9081.
  #
  # Run it on its own:
  #   docker compose up -d waha
  # Stop just WAHA:
  #   docker compose stop waha
  #
  # The backend's WAHA_ENABLED / WAHA_BASE_URL / WAHA_API_KEY env vars are
  # the only thing that ties POS to WAHA; this service is intentionally
  # detached from the proxy so it can be operated, scaled, and tunneled
  # separately.
  waha:
    image: devlikeapro/waha:latest
    restart: unless-stopped
    ports:
      # host:container — localhost-only by design. Cloudflared on this host
      # is what publishes the service to the internet.
      - "127.0.0.1:${WAHA_PORT:-9081}:3000"
    environment:
      # WAHA accepts both WHATSAPP_API_KEY and WAHA_API_KEY; we set both
      # for forward compatibility across image versions.
      WAHA_API_KEY: "${WAHA_API_KEY:-}"
      WHATSAPP_API_KEY: "${WAHA_API_KEY:-}"
      WAHA_DASHBOARD_USERNAME: "${WAHA_DASHBOARD_USERNAME:-}"
      WAHA_DASHBOARD_PASSWORD: "${WAHA_DASHBOARD_PASSWORD:-}"
      WHATSAPP_SWAGGER_USERNAME: "${WAHA_SWAGGER_USERNAME:-}"
      WHATSAPP_SWAGGER_PASSWORD: "${WAHA_SWAGGER_PASSWORD:-}"
      WHATSAPP_API_HOSTNAME: "${WAHA_PUBLIC_HOSTNAME:-waha.ourtestcloud.my.id}"
      WHATSAPP_API_PORT: "${WAHA_PUBLIC_PORT:-443}"
      WHATSAPP_API_SCHEMA: "${WAHA_PUBLIC_SCHEMA:-https}"
      WHATSAPP_DEFAULT_ENGINE: ${WAHA_ENGINE:-WEBJS}
      WAHA_PRINT_QR: "false"
    volumes:
      - waha-sessions:/app/.sessions
      - waha-media:/app/.media
    networks: [app-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  app-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  waha-sessions:
  waha-media:
  backend-storage:
