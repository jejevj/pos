user www-data;
worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Nginx runs as www-data here, but the Alpine package ships
    # /var/lib/nginx/* owned by the nginx user. Point all temp paths
    # at locations we explicitly create and chown to www-data in the
    # Dockerfile and entrypoint, so request bodies (e.g. base64 photo
    # uploads for attendance clock-in) can be buffered to disk.
    client_body_temp_path /var/lib/nginx/tmp/client_body 1 2;
    proxy_temp_path       /var/lib/nginx/tmp/proxy 1 2;
    fastcgi_temp_path     /var/lib/nginx/tmp/fastcgi 1 2;
    uwsgi_temp_path       /var/lib/nginx/tmp/uwsgi 1 2;
    scgi_temp_path        /var/lib/nginx/tmp/scgi 1 2;

    access_log /dev/stdout;

    server {
        listen 8080 default_server;
        server_name _;
        root /var/www/html/public;
        index index.php index.html;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 120;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
