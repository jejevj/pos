user nginx;
worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    access_log /dev/stdout;

    # backend and frontend are always part of the stack -> static upstreams.
    upstream backend  { server backend:8080;  keepalive 32; }
    upstream frontend { server frontend:80;   keepalive 32; }

    # WAHA is OPTIONAL (profile: whatsapp). Use Docker's embedded DNS
    # resolver and a runtime variable so nginx starts even when the `waha`
    # service isn't running; requests to /waha/ then return 502 cleanly
    # instead of crashing the proxy at boot.
    resolver 127.0.0.11 ipv6=off valid=30s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80 default_server;
        server_name _;

        # Laravel API
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Sanctum CSRF + auth endpoints + storage + swagger live on the backend
        location ~ ^/(sanctum|storage|api/documentation|docs|up) {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # WAHA WhatsApp gateway (REST + WebSocket). Strip the /waha prefix.
        # Resolved at request time so the proxy still starts when the
        # `waha` service isn't running; a missing upstream becomes 502.
        location /waha/ {
            set                $waha_upstream waha:3000;
            rewrite            ^/waha/?(.*)$ /$1 break;
            proxy_pass         http://$waha_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Vue SPA (catch-all)
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
