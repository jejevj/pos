user nginx;
worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    access_log /dev/stdout;

    # backend and frontend are always part of the stack -> static upstreams.
    upstream backend  { server backend:8080;  keepalive 32; }
    upstream frontend { server frontend:80;   keepalive 32; }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80 default_server;
        server_name _;

        # Laravel API
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Sanctum CSRF + auth endpoints + storage + swagger live on the backend
        location ~ ^/(sanctum|storage|api/documentation|docs|up) {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # WAHA used to be proxied here at /waha/. It is now a stand-alone
        # service on its own Cloudflare-tunneled hostname (default:
        # https://waha.ourtestcloud.my.id). Return 410 Gone so any stale
        # client immediately knows the path is dead instead of hanging.
        location /waha/ {
            default_type text/plain;
            return 410 "WAHA has moved off the POS proxy. Use the WAHA hostname directly (e.g. https://waha.ourtestcloud.my.id).\n";
        }

        # Vue SPA (catch-all)
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
